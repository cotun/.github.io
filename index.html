<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지상안전사고 사례 교육 포털 | 국토교통부</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <header class="sticky top-0 z-50 glass h-16 flex items-center px-6 justify-between shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-blue-200 shadow-lg">
                <i data-lucide="shield-check" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-800">지상안전 포털</h1>
        </div>
        <nav class="hidden md:flex gap-6 text-sm font-semibold text-slate-500">
            <a href="#" class="text-blue-600">홈</a>
            <a href="#" class="hover:text-slate-800 transition-colors">사고 사례</a>
            <a href="#" class="hover:text-slate-800 transition-colors">교육 자료</a>
            <a href="#" class="hover:text-slate-800 transition-colors">안전 수칙</a>
        </nav>
        <button class="p-2 hover:bg-slate-100 rounded-full transition-colors">
            <i data-lucide="menu" class="w-6 h-6 text-slate-600"></i>
        </button>
    </header>

    <main class="flex-1 max-w-4xl mx-auto w-full p-6 space-y-8">
        <section class="py-10 text-center space-y-4">
            <span class="inline-block px-3 py-1 bg-blue-100 text-blue-700 text-[12px] font-bold rounded-full uppercase tracking-wider">Safety Culture</span>
            <h2 class="text-4xl font-black text-slate-900 leading-tight">지상조업 안전사고<br><span class="text-blue-600">사례 교육 포털</span></h2>
            <p class="text-slate-500 font-medium">실제 사례를 통해 배우는 지상안전, 우리의 안전문화입니다.</p>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass p-6 rounded-2xl hover:shadow-xl transition-all cursor-pointer group">
                <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="alert-circle" class="w-6 h-6"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">최근 사고 사례</h3>
                <p class="text-slate-500 text-sm leading-relaxed">최근 발생한 지상안전사고의 원인과 대책을 분석한 리포트입니다.</p>
            </div>

            <div class="glass p-6 rounded-2xl hover:shadow-xl transition-all cursor-pointer group">
                <div class="w-12 h-12 bg-green-100 text-green-600 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="book-open" class="w-6 h-6"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">교육 자료실</h3>
                <p class="text-slate-500 text-sm leading-relaxed">현장에서 즉시 활용 가능한 동영상 및 문서 교육 자료를 확인하세요.</p>
            </div>
        </div>
    </main>

    <footer class="py-12 bg-white border-t border-slate-200">
        <div class="max-w-4xl mx-auto px-6 text-center space-y-6">
            <div class="flex justify-center">
                <div class="h-[2px] w-8 bg-slate-200 rounded-full"></div>
            </div>
            <div class="space-y-2">
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.25em]">Government Portal Service</p>
                <h4 class="text-[18px] font-extrabold text-slate-800">국토교통부 공항운영과</h4>
                <p class="text-[13px] text-slate-400 font-semibold leading-relaxed">지상조업 안전문화 정착을 위해 앞장섭니다.</p>
            </div>
            <p class="text-[11px] text-slate-300">© 2025 MOLIT. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Lucide 아이콘 초기화
        lucide.createIcons();
    </script>
</body>
</html>
